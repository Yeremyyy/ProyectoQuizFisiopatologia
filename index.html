<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO Técnico Principal -->
    <title>Quiz Fisiopatología | Evaluación Clínica Interactiva</title>
    <meta name="description"
        content="Plataforma de evaluación interactiva para estudiantes y especialistas. Pon a prueba tus conocimientos con nuestro quiz de fisiopatología, diabetes y síndrome metabólico.">
    <meta name="keywords"
        content="quiz fisiopatologia, examen fisiopatologia, test fisiopato, diabetes, resistencia a la insulina, evaluacion clinica">
    <meta name="author" content="Jordan Araya">
    <meta name="robots" content="index, follow">
    <!-- Verificación de Google -->
    <meta name="google-site-verification" content="gX3EU9rOmBaCkU5aIsKEL9bontocL7PWsxCSRc_a8UY" />

    <meta property="og:title" content="Quiz Fisiopatología | Evaluación Clínica">
    <meta property="og:description"
        content="Mide tus conocimientos médicos en esta plataforma interactiva de alto rendimiento.">
    <meta property="og:type" content="website">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Fuentes y CSS Asíncronos para evitar bloqueos -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Orbitron:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        media="print" onload="this.media='all'">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" media="print"
        onload="this.media='all'" />
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="bg-animated"></div>

    <!-- ELIMINADAS las clases animate__fadeIn para evitar invisibilidad en Lighthouse -->
    <div id="app-container">
        <header id="main-header" class="hidden">
            <div class="user-badge">
                <div class="avatar"><i class="fas fa-user-md"></i></div>
                <div class="details">
                    <span id="display-username">Identificando...</span>
                    <small id="display-level">NIVEL ACADÉMICO</small>
                </div>
            </div>

            <div class="timer-wrapper">
                <div class="timer-circle">
                    <span id="timer-count">15</span>
                    <div id="timer-face">😊</div>
                </div>
            </div>

            <div class="score-container">
                <span class="score-label">SCORE</span>
                <span id="current-score">000</span>
            </div>
        </header>

        <main id="main-content">
            <!-- Esqueleto LCP Absoluto (Imposible de ignorar por el navegador) -->
            <div id="lcp-skeleton"
                style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; position: fixed; top: 0; left: 0; background-color: #1a1a2e; z-index: 9999;">
                <h1 style="font-family: 'Orbitron', sans-serif; font-size: 3rem; color: #4facfe; margin: 0;">
                    FisioPatología</h1>
                <p style="font-family: 'Poppins', sans-serif; color: #e0e0e0; font-size: 1.2rem; margin-top: 15px;">
                    <i class="fas fa-spinner fa-spin"></i> Cargando sistema...
                </p>
            </div>
        </main>

        <footer class="corporate-footer">
            <div class="footer-content">
                <div class="corp-info">
                    <h4>Creado por: Jordan Araya</h4>
                    <p>Estudiante de Ingeniería en Informática<br>Universidad Santo Tomás, Sede Iquique</p>
                </div>
                <div class="contact-links">
                    <a href="#" class="contact-item"><i class="fas fa-envelope"></i> Contacto Desarrollador</a>
                    <div class="social-icons">
                        <i class="fab fa-linkedin"></i>
                        <i class="fab fa-github"></i>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <!-- Modal para Tabla de Récords -->
    <!-- Modal para Tabla de Récords -->
    <div id="records-modal" class="modal-overlay hidden">
        <div class="modal-content animate__animated animate__zoomIn">
            <h2><i class="fas fa-trophy" style="color: gold;"></i> Historial de Evaluaciones</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Especialista</th>
                            <th>Nivel</th>
                            <th>Puntos</th>
                        </tr>
                    </thead>
                    <tbody id="records-body">
                        <!-- JavaScript inyectará las filas (tr) y celdas (td) aquí automáticamente -->
                    </tbody>
                </table>
            </div>
            <button id="close-records-btn" class="main-btn" style="margin-top: 15px; width: 100%;">
                <i class="fas fa-times"></i> Cerrar Historial
            </button>
        </div>
    </div>

    <!-- Scripts deferidos -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
    <script type="module" src="js/app.js"></script>
</body>

</html>
